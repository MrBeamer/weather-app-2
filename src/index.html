<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <main class="center-container">
      <form id="weatherForm">
        <input type="text" name="cityName" id="cityName" required />
        <button type="submit">Search</button>
      </form>
      <section class="weather-data-top">
        <div class="city" id="city"></div>
        <div class="date" id="date"></div>
        <div class="container-condition">
          <div class="icon" id="weatherIcon"></div>
          <div class="condition-data">
            <div class="temp" id="temp"></div>
            <div class="condition" id="condition"></div>
          </div>
        </div>
      </section>
      <section class="weather-data-bottom">
        <div class="weather-data-card">
          <div class="weather-data-card-label">Low</div>
          <div class="weather-data-card-value" id="tempMin"></div>
        </div>
        <div class="weather-data-card">
          <div class="weather-data-card-label">High</div>
          <div class="weather-data-card-value" id="tempMax"></div>
        </div>
        <div class="weather-data-card">
          <div class="weather-data-card-label">Feels like</div>
          <div class="weather-data-card-value" id="feelsLike"></div>
        </div>
        <div class="weather-data-card">
          <div class="weather-data-card-label">Wind</div>
          <div class="weather-data-card-value" id="windSpeed"></div>
        </div>
      </section>
    </main>
  </body>
</html>
